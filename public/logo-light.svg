<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" fill="none">
  <!-- Monogram mark (teal bg for dark backgrounds) -->
  <rect width="48" height="48" rx="10" y="6" fill="#2C7A7B"/>
  <text x="8" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="white" letter-spacing="-1">A</text>
  <text x="24.5" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="-1">B</text>
  <!-- Company name (white for dark backgrounds) -->
  <text x="62" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="white" letter-spacing="0.5">Alexander</text>
  <text x="197" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)" letter-spacing="0.5">&amp;</text>
  <text x="218" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="white" letter-spacing="0.5">Blake</text>
  <!-- Tagline -->
  <text x="62" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.5)" letter-spacing="2.5">R&amp;D TAX CREDIT ADVISORY</text>
</svg>

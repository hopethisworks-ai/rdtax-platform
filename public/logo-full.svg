<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" fill="none">
  <!-- Monogram mark -->
  <rect width="48" height="48" rx="10" y="6" fill="#102A43"/>
  <clipPath id="accent-clip">
    <rect width="48" height="48" rx="10" y="6"/>
  </clipPath>
  <rect x="0" y="46" width="48" height="8" fill="#2C7A7B" clip-path="url(#accent-clip)"/>
  <text x="8" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="white" letter-spacing="-1">A</text>
  <text x="24.5" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" fill="#2C7A7B" letter-spacing="-1">B</text>
  <!-- Company name -->
  <text x="62" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#102A43" letter-spacing="0.5">Alexander</text>
  <text x="197" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#486581" letter-spacing="0.5">&amp;</text>
  <text x="218" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#102A43" letter-spacing="0.5">Blake</text>
  <!-- Tagline -->
  <text x="62" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#486581" letter-spacing="2.5" text-transform="uppercase">R&amp;D TAX CREDIT ADVISORY</text>
</svg>
